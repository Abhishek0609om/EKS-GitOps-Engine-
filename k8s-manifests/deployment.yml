apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoniex-deployment
  labels:
    app: phoenix-app
spec:

# lancuh 2 replicas of the application
  replicas: 2
  selector:
    matchLabels:
      app: phoenix-app
  template:
    metadata:
      labels:
        app: phoenix-app
    spec:
      containers:
      - name: phoenix-app
        image: nginx:alpine
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        - containerPort: 8000
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
