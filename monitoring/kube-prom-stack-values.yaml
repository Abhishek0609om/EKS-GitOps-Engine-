prometheus:
  prometheusSpec:
    retention: 3d
    scrapeInterval: 30s
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    serviceMonitorSelectorNilUsesHelmValues: false

grafana:
  enabled: true
  replicas: 1
  adminPassword: admin123
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
    datasources:
      enabled: true

alertmanager:
  enabled: false

kubeStateMetrics:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 50m
      memory: 128Mi

nodeExporter:
  enabled: true
